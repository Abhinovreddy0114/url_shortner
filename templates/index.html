<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SnapURL - A high-performance, pure PostgreSQL URL shortener. Instant redirection, custom aliases, and link expiration.">
    <title>SnapURL - Pure PostgreSQL URL Shortener</title>
    <!-- Outfit Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="glass-bg"></div>
    
    <div class="app-container">
        <main class="card">
            <header>
                <div class="logo-container">
                    <span class="logo-icon">⚡</span>
                </div>
                <h1>SnapURL</h1>
                <p>Pure PostgreSQL URL Shortener</p>
            </header>

            <form id="shorten-form" autocomplete="off" novalidate>
                <!-- Long URL Input -->
                <div class="form-group">
                    <label for="long-url">Destination URL</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                            </svg>
                        </span>
                        <input 
                            type="url" 
                            id="long-url" 
                            name="long_url" 
                            placeholder="https://example.com/very/long/path" 
                            required
                        >
                    </div>
                </div>

                <!-- Custom Alias Input -->
                <div class="form-group">
                    <label for="custom-alias">
                        Custom Alias <span class="optional-badge">(Optional)</span>
                    </label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
                                <line x1="7" y1="7" x2="7.01" y2="7"></line>
                            </svg>
                        </span>
                        <input 
                            type="text" 
                            id="custom-alias" 
                            name="custom_alias" 
                            placeholder="my-cool-link"
                            maxlength="50"
                        >
                    </div>
                    <div class="input-hint">Only letters, numbers, dashes, and underscores allowed.</div>
                </div>

                <!-- Expiration Date Input -->
                <div class="form-group">
                    <label for="expiration-date">
                        Expiration Date <span class="optional-badge">(Optional)</span>
                    </label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="16" y1="2" x2="16" y2="6"></line>
                                <line x1="8" y1="2" x2="8" y2="6"></line>
                                <line x1="3" y1="10" x2="21" y2="10"></line>
                            </svg>
                        </span>
                        <input 
                            type="datetime-local" 
                            id="expiration-date" 
                            name="expiration_date"
                        >
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="btn-submit" class="btn-submit">
                    <span class="spinner" id="btn-spinner"></span>
                    <span class="btn-text">Shorten URL</span>
                </button>
            </form>

            <!-- Error Display Alert -->
            <div id="error-alert" class="alert alert-error hidden" role="alert">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                <span id="error-msg">An error occurred. Please try again.</span>
            </div>

            <!-- Result Section -->
            <section id="result-section" class="result-section hidden">
                <div class="result-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                    URL Shortened Successfully!
                </div>
                <div class="result-box">
                    <div id="short-url" class="short-url-text">https://snap.url/code</div>
                    <button id="btn-copy" class="btn-copy">
                        <svg class="copy-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                        <span id="copy-text">Copy</span>
                    </button>
                </div>
                <div id="expiration-meta" class="metadata-display hidden"></div>
            </section>
        </main>
    </div>

    <!-- Frontend logic script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('shorten-form');
            const submitBtn = document.getElementById('btn-submit');
            const errorAlert = document.getElementById('error-alert');
            const errorMsg = document.getElementById('error-msg');
            const resultSection = document.getElementById('result-section');
            const shortUrlText = document.getElementById('short-url');
            const copyBtn = document.getElementById('btn-copy');
            const copyText = document.getElementById('copy-text');
            const expirationMeta = document.getElementById('expiration-meta');

            // Handle Form Submission
            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                // Reset state
                errorAlert.classList.add('hidden');
                resultSection.classList.add('hidden');
                expirationMeta.classList.add('hidden');
                
                const longUrl = document.getElementById('long-url').value.trim();
                const customAlias = document.getElementById('custom-alias').value.trim();
                const expirationDate = document.getElementById('expiration-date').value;

                if (!longUrl) {
                    showError('Please enter a destination URL.');
                    return;
                }

                // Simple frontend validation for alias format
                if (customAlias && !/^[a-zA-Z0-9\-_]+$/.test(customAlias)) {
                    showError('Custom alias can only contain letters, numbers, dashes, and underscores.');
                    return;
                }

                // Enable Loading State
                submitBtn.classList.add('loading');
                submitBtn.disabled = true;

                try {
                    const response = await fetch('/urls', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            long_url: longUrl,
                            custom_alias: customAlias || null,
                            expiration_date: expirationDate || null
                        })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error || 'Failed to shorten URL');
                    }

                    // Success state
                    // Construct short URL using window.location.origin
                    const fullShortUrl = `${window.location.origin}/${data.short_code}`;
                    shortUrlText.textContent = fullShortUrl;
                    
                    // Show expiration metadata if set
                    if (data.expiration_date) {
                        const localDate = new Date(data.expiration_date).toLocaleString();
                        expirationMeta.textContent = `This link will expire on: ${localDate}`;
                        expirationMeta.classList.remove('hidden');
                    }

                    resultSection.classList.remove('hidden');
                    // Scroll into view
                    resultSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                } catch (err) {
                    showError(err.message);
                } finally {
                    // Disable Loading State
                    submitBtn.classList.remove('loading');
                    submitBtn.disabled = false;
                }
            });

            // Handle Copy Button Click
            copyBtn.addEventListener('click', async () => {
                const textToCopy = shortUrlText.textContent;
                try {
                    await navigator.clipboard.writeText(textToCopy);
                    copyBtn.classList.add('copied');
                    copyText.textContent = 'Copied!';
                    
                    setTimeout(() => {
                        copyBtn.classList.remove('copied');
                        copyText.textContent = 'Copy';
                    }, 2000);
                } catch (err) {
                    console.error('Failed to copy to clipboard', err);
                }
            });

            // Display Error Utility
            function showError(message) {
                errorMsg.textContent = message;
                errorAlert.classList.remove('hidden');
                errorAlert.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        });
    </script>
</body>
</html>
